name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module:
          - orchestrator
          - reactivation
          - lead-scoring
          - data-migration
          - ghl-setup
          - mcp-server
          - elevenlabs-mcp
          - idx-mcp
          - homie-admin-mcp
          - showings-mcp
          - vendor-mcp
          - deal-analysis-mcp
          - queue
          - monitoring

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.module }}/package.json

      - name: Install dependencies
        working-directory: ${{ matrix.module }}
        run: npm install

      - name: Build TypeScript
        working-directory: ${{ matrix.module }}
        run: npm run build

  build-next:
    name: Next.js Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module:
          - idx-website
          - dashboard
          - roi-calculator
          - sales-deck
          - setup-wizard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.module }}/package.json

      - name: Install dependencies
        working-directory: ${{ matrix.module }}
        run: npm install

      - name: Build Next.js
        working-directory: ${{ matrix.module }}
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't fail on missing env vars
          GHL_API_KEY: dummy
          GHL_LOCATION_ID: dummy
          IDX_API_KEY: dummy
          IDX_API_SECRET: dummy
          ANTHROPIC_API_KEY: dummy
          NEXT_PUBLIC_GHL_LOCATION_ID: dummy

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module:
          - lead-scoring
          - orchestrator
          - dashboard
          - reactivation
          - data-migration

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.module }}/package.json

      - name: Install dependencies
        working-directory: ${{ matrix.module }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: npm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright deps (Chromium only)
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Install and build apps
        env:
          GHL_API_KEY: dummy
          GHL_LOCATION_ID: dummy
          IDX_API_KEY: dummy
          IDX_API_SECRET: dummy
          ANTHROPIC_API_KEY: dummy
          NEXT_PUBLIC_GHL_LOCATION_ID: dummy
        run: |
          npm install --prefix setup-wizard && npm run build --prefix setup-wizard
          npm install --prefix dashboard && npm run build --prefix dashboard
          npm install --prefix roi-calculator && npm run build --prefix roi-calculator
          npm install --prefix sales-deck && npm run build --prefix sales-deck

      - name: Run E2E tests
        working-directory: e2e
        env:
          GHL_API_KEY: dummy
          GHL_LOCATION_ID: dummy
          IDX_API_KEY: dummy
          IDX_API_SECRET: dummy
          ANTHROPIC_API_KEY: dummy
          NEXT_PUBLIC_GHL_LOCATION_ID: dummy
        run: npx playwright test

  lint:
    name: Env Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check .env.example exists at root
        run: test -f .env.example
      - name: Check no hardcoded API keys
        run: |
          if grep -rE "(sk-ant-[a-zA-Z0-9]{20,}|ELEVENLABS_KEY=[a-zA-Z0-9]{10,})" --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=dist --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "Hardcoded API key pattern detected!"
            exit 1
          fi
          echo "No hardcoded keys found."
