name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module:
          - orchestrator
          - reactivation
          - lead-scoring
          - data-migration
          - ghl-setup
          - mcp-server
          - elevenlabs-mcp
          - idx-mcp
          - homie-admin-mcp
          - showings-mcp
          - vendor-mcp
          - deal-analysis-mcp
          - queue
          - monitoring

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.module }}/package.json

      - name: Install dependencies
        working-directory: ${{ matrix.module }}
        run: npm install

      - name: Build TypeScript
        working-directory: ${{ matrix.module }}
        run: npm run build

  build-next:
    name: Next.js Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module:
          - idx-website
          - dashboard
          - roi-calculator
          - sales-deck
          - setup-wizard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.module }}/package.json

      - name: Install dependencies
        working-directory: ${{ matrix.module }}
        run: npm install

      - name: Build Next.js
        working-directory: ${{ matrix.module }}
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't fail on missing env vars
          GHL_API_KEY: dummy
          GHL_LOCATION_ID: dummy
          IDX_API_KEY: dummy
          IDX_API_SECRET: dummy
          ANTHROPIC_API_KEY: dummy
          NEXT_PUBLIC_GHL_LOCATION_ID: dummy

  lint:
    name: Env Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check .env.example exists at root
        run: test -f .env.example
      - name: Check no hardcoded API keys
        run: |
          if grep -rE "(sk-ant-|ghl_|ELEVENLABS_KEY=\w)" --include="*.ts" --include="*.tsx" --include="*.js" .; then
            echo "Hardcoded API key pattern detected!"
            exit 1
          fi
          echo "No hardcoded keys found."
